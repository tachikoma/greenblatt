name: Live Trading Manual (GitHub-Hosted)

# 사용법:
# - `workflow_dispatch` 입력에서 `dry_run`을 `true`로 설정하면 주문 없이
#   신호 생성 및 주문 의도 계산(시뮬레이션)까지 전체 흐름을 실행합니다.
# - 워크플로는 `dry_run=true`일 때 `run_live_trading.py`에 `--dry-run`을
#   전달하여 실주문/체결/상태 갱신 동작을 수행하지 않습니다.

on:
  workflow_dispatch:
    inputs:
      signal_date:
        description: "신호 기준일 (YYYY-MM-DD, 비우면 실행일)"
        required: false
        type: string
      force:
        description: "이미 실행한 주기도 강제 실행"
        required: false
        default: false
        type: boolean
      dry_run:
        description: "실주문 없이 시뮬레이션 실행 (true/false)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  run-live-trading:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      KIWOOM_MODE: mock
      KIWOOM_APPKEY: ${{ secrets.KIWOOM_APPKEY_MOCK }}
      KIWOOM_SECRETKEY: ${{ secrets.KIWOOM_SECRETKEY_MOCK }}
      KIWOOM_ACCOUNT_NO: ''

      INVESTMENT_RATIO: ${{ vars.LIVE_INVESTMENT_RATIO || '0.95' }}
      PYKRX_LOGIN_ID: ${{ secrets.PYKRX_LOGIN_ID }}
      PYKRX_LOGIN_PW: ${{ secrets.PYKRX_LOGIN_PW }}
      FUNDAMENTAL_SOURCE: ${{ vars.LIVE_FUNDAMENTAL_SOURCE_MOCK || 'kiwoom' }}
      LIVE_COMMON_REQUEST_RETRIES: ${{ vars.LIVE_COMMON_REQUEST_RETRIES || '3' }}
      LIVE_COMMON_REQUEST_RETRY_BACKOFF_SECONDS: ${{ vars.LIVE_COMMON_REQUEST_RETRY_BACKOFF_SECONDS || '0.5' }}
      PYKRX_REQUEST_TIMEOUT: ${{ vars.PYKRX_REQUEST_TIMEOUT || '6.0' }}
      PYKRX_SESSION_DEBUG: ${{ vars.PYKRX_SESSION_DEBUG || '0' }}
      KIWOOM_PREFILTER_ENABLED: ${{ vars.KIWOOM_PREFILTER_ENABLED_MOCK || 'true' }}
      KIWOOM_PREFILTER_TARGET: ${{ vars.KIWOOM_PREFILTER_TARGET_MOCK || '500' }}
      KIWOOM_PREFILTER_MIN_MCAP: ${{ vars.KIWOOM_PREFILTER_MIN_MCAP || '50000000000' }}
      KIWOOM_FUND_CONCURRENCY: ${{ vars.KIWOOM_FUND_CONCURRENCY_MOCK || '1' }}
      NUM_STOCKS: ${{ vars.LIVE_NUM_STOCKS || '40' }}
      REBALANCE_DAYS: ${{ vars.REBALANCE_DAYS_MOCK || '' }}
      REBALANCE_MONTHS: ${{ vars.LIVE_REBALANCE_MONTHS || '3' }}
      ORDER_TIMEOUT_MINUTES: ${{ vars.LIVE_ORDER_TIMEOUT_MINUTES || '3' }}
      ORDER_PRICE_OFFSET_BPS: ${{ vars.LIVE_ORDER_PRICE_OFFSET_BPS || '10' }}
      USE_HOGA_RETRY_PRICE: ${{ vars.LIVE_USE_HOGA_RETRY_PRICE || 'true' }}
      RETRY_PRICE_OFFSET_BPS: ${{ vars.LIVE_RETRY_PRICE_OFFSET_BPS || '25' }}
      MAX_RETRY_ROUNDS: ${{ vars.LIVE_MAX_RETRY_ROUNDS || '2' }}
      REBALANCE_GUARD_ENABLED: ${{ vars.LIVE_REBALANCE_GUARD_ENABLED || 'true' }}
      LIVE_RUN_STATE_PATH: results/live_state/rebalance_state.json
      LIVE_RUN_LOCK_PATH: results/live_state/rebalance.lock
      SAVE_DAILY_REPORT: ${{ vars.LIVE_SAVE_DAILY_REPORT || 'true' }}
      REPORT_DIR: results/live_reports
      OPEN_WAIT_ENABLED: ${{ vars.LIVE_OPEN_WAIT_ENABLED || 'false' }}
      COMMISSION_FEE_RATE: ${{ vars.LIVE_COMMISSION_FEE_RATE || '0.0035' }}
      EXISTING_POSITIONS_POLICY: ${{ vars.LIVE_EXISTING_POSITIONS_POLICY_MOCK || 'hold' }} # hold | sell

      KIWOOM_ORDER_ENDPOINT: ${{ vars.KIWOOM_ORDER_ENDPOINT || '/api/dostk/ordr' }}
      KIWOOM_ORDER_API_ID: ${{ vars.KIWOOM_ORDER_API_ID || 'kt10000' }}
      KIWOOM_ORDER_STATUS_ENDPOINT: ${{ vars.KIWOOM_ORDER_STATUS_ENDPOINT || '/api/dostk/acnt' }}
      KIWOOM_ORDER_STATUS_API_ID: ${{ vars.KIWOOM_ORDER_STATUS_API_ID || 'kt00007' }}
      KIWOOM_ORDER_CANCEL_ENDPOINT: ${{ vars.KIWOOM_ORDER_CANCEL_ENDPOINT || '/api/dostk/ordr' }}
      KIWOOM_ORDER_CANCEL_API_ID: ${{ vars.KIWOOM_ORDER_CANCEL_API_ID || 'kt10002' }}
      KIWOOM_QUOTE_ENDPOINT: ${{ vars.KIWOOM_QUOTE_ENDPOINT || '/api/dostk/mrkcond' }}
      KIWOOM_QUOTE_API_ID: ${{ vars.KIWOOM_QUOTE_API_ID || 'ka10004' }}
      KIWOOM_QUOTE_MARKET_TYPE: ${{ vars.KIWOOM_QUOTE_MARKET_TYPE || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Restore run state cache
        uses: actions/cache/restore@v4
        with:
          path: results/live_state
          key: live-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            live-state-${{ github.ref_name }}-

      - name: Install dependencies
        run: uv sync --frozen



      - name: Run live trading
        run: |
          FORCE_FLAG=""
          DRY_FLAG=""
          SIGNAL_DATE=""

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.force }}" = "true" ]; then
              FORCE_FLAG="--force"
            fi
            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              DRY_FLAG="--dry-run"
            fi
            SIGNAL_DATE="${{ github.event.inputs.signal_date }}"
          fi

          if [ -n "$SIGNAL_DATE" ]; then
            uv run run_live_trading.py --signal-date "$SIGNAL_DATE" $FORCE_FLAG $DRY_FLAG
          else
            uv run run_live_trading.py $FORCE_FLAG $DRY_FLAG
          fi

      - name: Save run state cache
        if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}
        uses: actions/cache/save@v4
        with:
          path: results/live_state
          key: live-state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Upload reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-reports-${{ github.run_id }}
          path: results/live_reports
          if-no-files-found: ignore